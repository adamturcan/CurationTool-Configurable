name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memorise-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: memorise-ui/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memorise-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: memorise-ui/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memorise-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: memorise-ui/package-lock.json
      - run: npm ci
      - run: npm run test -- --run --reporter=verbose

  build:
    needs: [typecheck, lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memorise-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: memorise-ui/package-lock.json
      - run: npm ci
      - name: Build thesaurus index (if available)
        run: |
          if [ -f "public/thesaurus-full.json" ]; then
            npm run build:thesaurus
          fi
      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm run build
          cp dist/index.html dist/404.html
      - name: Build TypeDoc API docs
        run: |
          npm run build:docs
          mkdir -p dist/docs
          cp -r docs/api/. dist/docs/
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: memorise-ui/dist

  docker:
    needs: [typecheck, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: memorise-ui
        run: docker build -t memorise-ui:ci .

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
