# Frontend only, no backend. Workspaces are kept in localStorage.
# Run with: docker compose -f docker-compose.standalone.yml up

services:
  memorise-ui:
    build:
      context: ./memorise-ui
      args:
        VITE_BASE_PATH: /
        VITE_NER_API_URL: ${VITE_NER_API_URL:-https://ner-api.dev.memorise.sdu.dk/recognize}
        VITE_SEGMENT_API_URL: ${VITE_SEGMENT_API_URL:-https://textseg-api.dev.memorise.sdu.dk/segment}
        VITE_CLASSIFY_API_URL: ${VITE_CLASSIFY_API_URL:-https://semtag-api.dev.memorise.sdu.dk/classify}
        VITE_TRANSLATION_API_URL: ${VITE_TRANSLATION_API_URL:-https://mt-api.dev.memorise.sdu.dk/translate}
    ports:
      - "3000:80"
    restart: unless-stopped
